<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HeartTattoo meets 瀬川陽菜乃</title>
    <style>
        .text {
            font-size: 20px;
            transition: all 0.5s; /* 変化をなめらかにする設定 */
        }
        body {
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .wd1080{
            width:100%;
            max-width: 1080px;
            padding: 0;
            list-style: none; /* リストの黒点を消す */
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 横に3個均等に並べる */
            gap: 15px;                            /* 画像と画像のすき間 */
            max-width: 1080px;                     /* 全体の最大幅 */
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 画像を囲む枠の設定（初期状態：透明で少し下にある） */
        .grid-item {
            overflow: hidden;
            border-radius: 8px;
            background-color: #fff;               /* 画像が読み込まれる前の背景色 */
            opacity: 0;
            transform: translateY(30px);
        }

        /* 「is-show」がついたらアニメーションを開始させる */
        .grid-container.is-show .grid-item {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* 各画像が表示されるタイミングをずらす設定（ディレイ） */
        .grid-container.is-show .grid-item:nth-child(1) { animation-delay: 0.3s; }
        .grid-container.is-show .grid-item:nth-child(2) { animation-delay: 0.4s; }
        .grid-container.is-show .grid-item:nth-child(3) { animation-delay: 0.5s; }
        .grid-container.is-show .grid-item:nth-child(4) { animation-delay: 0.6s; }
        .grid-container.is-show .grid-item:nth-child(5) { animation-delay: 0.7s; }
        .grid-container.is-show .grid-item:nth-child(6) { animation-delay: 0.8s; }
        .grid-container.is-show .grid-item:nth-child(7) { animation-delay: 0.9s; }
        .grid-container.is-show .grid-item:nth-child(8) { animation-delay: 1.0s; }
        .grid-container.is-show .grid-item:nth-child(9) { animation-delay: 1.1s; }

        /* フワッと上がって表示されるアニメーションの定義 */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 💡 追加：単体画像（5番目の画像）の初期状態とアニメーション設定 */
        .fade-in-single {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        /* スクロールして画面に入ったら表示 */
        .fade-in-single.is-show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 画像自体の設定 */
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;                    /* 枠線に合わせて綺麗にトリミング */
            display: block;
        }
        
        /* 既存の他の画像の設定（幅を100%に均一化） */
        .wd1080 img {
            width: 100%;
            display: block;
        }
        
    </style>
</head>
<body>

<ul class="wd1080" style="position:relative;">
    <li class="wd1080" style="position:relative;">
        <img src="HT_260617_1.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;">
        <img src="HT_260617_2.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;">

    <li>

            <div class="grid-item"><img src="HT_260617_3_01.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_02.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_03.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_04.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_05.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_06.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_07.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_08.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_09.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
        </div>
    </li>

    <li class="wd1080" style="position:relative;">
        <img src="HT_260617_４.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>
        
        <img src="HT_260617_5.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single" id="scroll-single"><br><br>

        <img src="HT_260617_6.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>    
        <img src="HT_260617_7.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>
        <img src="HT_260617_8.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>

        <img src="HT_260617_10.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>     
        <img src="HT_260617_11.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>
        <img src="HT_260617_12.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>
        <img src="HT_260617_13.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;"><br><br>    
    </li>    
</ul>

<script>
    // 💡 3×3のコンテナと、5番目の画像の両方をJavaScriptに読み込みます
    const gridContainer = document.getElementById('scroll-grid');
    const singleImage = document.getElementById('scroll-single');

    const options = {
        root: null,
        rootMargin: "0px",
        threshold: 0.1 /* 10%見えたら動き出す設定 */
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-show');
                observer.unobserve(entry.target); // 1回動いたらその要素の監視を終了
            }
        });
    }, options);

    // 💡 3×3のグリッドと、5番目の画像の両方をそれぞれ監視対象に登録します
    observer.observe(gridContainer);
    if (singleImage) {
        observer.observe(singleImage);
    }
</script>
    
</body>
