<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JavaScriptアニメーションの例</title>
    <style>
        .text {
            font-size: 20px;
            transition: all 0.5s; /* 変化をなめらかにする設定 */
        }
    </style>
</head>
<body>

    <p id="target-text" class="text">大きくなるテキスト</p>
    <button onclick="zoomText()">ここをクリック！</button>

    <script>
        function zoomText() {
            const text = document.getElementById('target-text');
            // 文字サイズを40pxに変更
            text.style.fontSize = '40px';
            text.style.color = '#1e90ff';
        }
    </script>
<ul class="mgb100_ wd1100_" style="position:relative;">
<li class="wd1100_ " style="position:relative;">
<img class="wow fadeInDownsmall z-index10_ mgt40_ top_" data-wow-duration="1s" data-wow-delay=".5s" src="1.jpg" alt="" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;">
<img class="wow fadeInDownsmall z-index10_ mgt40_" data-wow-duration="1s" data-wow-delay=".5s" src="https://www.burnedestrose.com/img/redyazel/ra_lp_1206_text1.jpg" alt="" style="visibility: visible; animation-duration: 1s; animation-delay: 0.5s; animation-name: fadeInDownsmall;">
</li>
</ul>

    
</body>
</html>
