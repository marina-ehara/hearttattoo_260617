<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HeartTattoo meets 瀬川陽菜乃</title>
    <style>
        .text {
            font-size: 20px;
            transition: all 0.5s; /* 変化をなめらかにする設定 */
        }
        body {
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .wd1080{
            width:100%;
            max-width: 1080px;
            padding: 0;
            list-style: none; /* リストの黒点を消す */
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 横に3個均等に並べる */
            gap: 15px;                            /* 画像と画像のすき間 */
            max-width: 1080px;                     /* 全体の最大幅 */
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 3×3マスの画像枠の初期状態 */
        .grid-item {
            overflow: hidden;
            border-radius: 8px;
            background-color: #fff;
            opacity: 0;
            transform: translateY(30px);
        }

        /* 3×3マスが画面に入ったらアニメーション開始 */
        .grid-container.is-show .grid-item {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* 3×3マスの時間差（ディレイ）設定 */
        .grid-container.is-show .grid-item:nth-child(1) { animation-delay: 0.1s; }
        .grid-container.is-show .grid-item:nth-child(2) { animation-delay: 0.2s; }
        .grid-container.is-show .grid-item:nth-child(3) { animation-delay: 0.3s; }
        .grid-container.is-show .grid-item:nth-child(4) { animation-delay: 0.4s; }
        .grid-container.is-show .grid-item:nth-child(5) { animation-delay: 0.5s; }
        .grid-container.is-show .grid-item:nth-child(6) { animation-delay: 0.6s; }
        .grid-container.is-show .grid-item:nth-child(7) { animation-delay: 0.7s; }
        .grid-container.is-show .grid-item:nth-child(8) { animation-delay: 0.8s; }
        .grid-container.is-show .grid-item:nth-child(9) { animation-delay: 0.9s; }

        /* フワッと上がって表示されるアニメーションの定義 */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 縦並びのすべての画像の初期状態（透明で少し下にある） */
        .fade-in-single {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s ease-out, transform 0.9s ease-out;
        }
        /* スクロールして画面に入ったら表示 */
        .fade-in-single.is-show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 3×3の画像自体の設定 */
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* 縦並びの画像の設定（幅を100%に均一化、縦のすき間を綺麗にする） */
        .wd1080 img {
            width: 100%;
            display: block;
        }

        /* 💡 新設：カルーセル（スライダー）のCSS設定 */
        .carousel-section {
            width: 100%;
            max-width: 1080px;
            position: relative;
            overflow: hidden; /* はみ出た画像を隠す */
            margin-bottom: 16px;
        }

        .carousel-track {
            display: flex;
            width: 100%;
            transition: transform 0.5s ease-in-out; /* スライドスピード */
        }

        .carousel-slide {
            min-width: 100%; /* 枠内に1枚ぴったり収める */
            box-sizing: border-box;
        }

        /* カルーセルの左右ボタン */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.7);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
            transition: background 0.2s;
        }

        .carousel-btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .carousel-btn.prev { left: 15px; }
        .carousel-btn.next { right: 15px; }
        
    </style>
</head>
<body>

<ul class="wd1080" style="position:relative;">
    <li class="wd1080" style="position:relative;">
        <img src="HT_260617_1.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        <img src="HT_260617_2.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
    </li>

    <li>
        <div class="grid-container" id="scroll-grid">
            <div class="grid-item"><img src="HT_260617_3_01.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_02.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_03.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_04.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_05.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_06.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_07.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_08.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            <div class="grid-item"><img src="HT_260617_3_09.jpg" alt="HeartTattoo,瀬川陽cache_09,ひなぽん"></div>
        </div>
    </li>

    <li class="wd1080" style="position:relative;">
        <img src="HT_260617_４.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        <img src="HT_260617_5.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        
        <div class="carousel-section fade-in-single">
            <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-slide"><img src="HT_260617_3_01.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
                <div class="carousel-slide"><img src="HT_260617_3_02.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
                <div class="carousel-slide"><img src="HT_260617_3_03.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん"></div>
            </div>
            <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
        </div>
        
        <img src="HT_260617_6.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>    
        <img src="HT_260617_7.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        <img src="HT_260617_8.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        <img src="HT_260617_9.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>   
        <img src="HT_260617_10.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>     
        <img src="HT_260617_11.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        <img src="HT_260617_12.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>
        <img src="HT_260617_13.jpg" alt="HeartTattoo,瀬川陽菜乃,ひなぽん" class="fade-in-single"><br><br>    
    </li>    
</ul>

<script>
    // --- スクロール監視の処理 ---
    const gridContainer = document.getElementById('scroll-grid');
    const singleImages = document.querySelectorAll('.fade-in-single');

    const options = {
        root: null,
        rootMargin: "0px",
        threshold: 0.1
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-show');
                observer.unobserve(entry.target);
            }
        });
    }, options);

    if (gridContainer) observer.observe(gridContainer);
    singleImages.forEach(image => {
        observer.observe(image);
    });

    // --- 💡 追加：カルーセルのスライド制御処理 ---
    let currentSlide = 0;
    const track = document.getElementById('carouselTrack');
    const slides = document.querySelectorAll('.carousel-slide');
    const totalSlides = slides.length;

    function moveSlide(direction) {
        currentSlide += direction;
        
        if (currentSlide < 0) {
            currentSlide = totalSlides - 1; // 最初の枚数より前なら最後の枚数へ
        } else if (currentSlide >= totalSlides) {
            currentSlide = 0; // 最後の枚数より後ろなら最初の枚数へ
        }
        
        track.style.transform = `translateX(-${currentSlide * 100}%)`;
    }
</script>
    
</body>
</html>
