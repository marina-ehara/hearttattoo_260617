<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JavaScriptアニメーションの例</title>
    <style>
        .text {
            font-size: 20px;
            transition: all 0.5s; /* 変化をなめらかにする設定 */
        }
        body {
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .wd1080{
            width:100%;
        }
        

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 横に3個均等に並べる */
            gap: 15px;                            /* 画像と画像のすき間 */
            max-width: 1080px;                     /* 全体の最大幅 */
            width: 100%;
            padding: 20px;
        }

        /* 画像を囲む枠の設定 */
        .grid-item {
            overflow: hidden;
            border-radius: 8px;
            background-color: #ddd;               /* 画像が読み込まれる前の背景色 */
            
            /* アニメーションの初期状態（透明で、少し下にある） */
            opacity: 0;
            transform: translateY(20px);
            
            /* アニメーションの指定（名前、時間、なめらかさ、終了時の状態をキープ） */
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* 画像自体の設定 */
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;                    /* 枠線に合わせて綺麗にトリミング */
            display: block;
        }

        /* 各画像が表示されるタイミングをずらす設定（ディレイ） */
        .grid-item:nth-child(1) { animation-delay: 0.1s; }
        .grid-item:nth-child(2) { animation-delay: 0.3s; }
        .grid-item:nth-child(3) { animation-delay: 0.5s; }
        .grid-item:nth-child(4) { animation-delay: 0.7s; }
        .grid-item:nth-child(5) { animation-delay: 0.9s; }
        .grid-item:nth-child(6) { animation-delay: 1.1s; }
        .grid-item:nth-child(7) { animation-delay: 1.3s; }
        .grid-item:nth-child(8) { animation-delay: 1.5s; }
        .grid-item:nth-child(9) { animation-delay: 1.7s; }

        /* フワッと上がって表示されるアニメーションの中身 */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
    </style>
</head>
<body>

    <p id="target-text" class="text">大きくなるテキスト</p>
    <button onclick="zoomText()">ここをクリック！</button>

    <script>
        function zoomText() {
            const text = document.getElementById('target-text');
            // 文字サイズを40pxに変更

        }
